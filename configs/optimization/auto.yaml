enabled: false
strategy: optuna         # optuna, grid, random
n_trials: 20
timeout: null            # seconds, null = no limit
direction: maximize      # maximize or minimize (auto-set)
sampler: tpe             # tpe, random, grid, cmaes
pruner: median           # median, hyperband, none

search_space:
  learning_rate:
    type: float
    low: 1.0e-6
    high: 1.0e-3
    log: true
  per_device_train_batch_size:
    type: categorical
    choices: [4, 8, 16, 32]
  weight_decay:
    type: float
    low: 0.0
    high: 0.1
  warmup_ratio:
    type: float
    low: 0.0
    high: 0.3
  lora_r:
    type: categorical
    choices: [8, 16, 32, 64]
  lora_alpha:
    type: categorical
    choices: [16, 32, 64, 128]

cv_folds: null           # null = no cross-validation
stratified: true
